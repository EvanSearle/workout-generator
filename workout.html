<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222222;
      --border: #2a2a2a;
      --accent: #e63946;
      --accent-dark: #c1121f;
      --text: #f0f0f0;
      --text-muted: #888;
      --selected-border: #e63946;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #1a1a1a 0%, #111 100%);
      border-bottom: 2px solid var(--accent);
      padding: 28px 24px 22px;
      text-align: center;
    }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      letter-spacing: 3px;
      color: var(--text);
      line-height: 1;
    }
    header h1 span { color: var(--accent); }
    header p {
      margin-top: 6px;
      color: var(--text-muted);
      font-size: 0.88rem;
      letter-spacing: 0.5px;
    }

    /* ── MAIN CONTAINER ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px 0;
    }

    /* ── SECTION LABELS ── */
    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    /* ── MUSCLE GROUP GRID ── */
    .muscle-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 32px;
    }

    .muscle-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.18s, background 0.18s, transform 0.12s;
    }
    .muscle-card:hover { border-color: #555; transform: translateY(-1px); }
    .muscle-card.selected {
      border-color: var(--selected-border);
      background: #2a1215;
    }
    .muscle-card .icon { font-size: 1.6rem; margin-bottom: 6px; }
    .muscle-card .label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: var(--text);
    }
    .muscle-card.selected .label { color: #fff; }

    /* ── CONTROLS ROW ── */
    .controls-row {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .control-group { display: flex; flex-direction: column; gap: 8px; }
    .control-group label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
    }
    .number-input-wrap {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .num-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      width: 38px;
      height: 42px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .num-btn:hover { color: var(--text); background: var(--surface2); }
    #exercise-count {
      background: none;
      border: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      width: 44px;
      text-align: center;
      outline: none;
    }
    #exercise-count::-webkit-inner-spin-button,
    #exercise-count::-webkit-outer-spin-button { -webkit-appearance: none; }

    .btn {
      height: 42px;
      padding: 0 28px;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover { border-color: #555; background: #2a2a2a; }

    /* ── ERROR / NOTICE ── */
    .notice {
      background: #2a1215;
      border: 1px solid #6b1d24;
      border-radius: 8px;
      color: #f28b8f;
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
    }
    .notice.visible { display: block; }

    /* ── OUTPUT AREA ── */
    #output { display: none; }
    #output.visible { display: block; }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }
    .output-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 2px;
    }
    .output-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── EXERCISE CARDS ── */
    .exercise-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }
    .exercise-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      animation: fadeSlide 0.25s ease both;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .exercise-card:nth-child(1)  { animation-delay: 0.00s; }
    .exercise-card:nth-child(2)  { animation-delay: 0.03s; }
    .exercise-card:nth-child(3)  { animation-delay: 0.06s; }
    .exercise-card:nth-child(4)  { animation-delay: 0.09s; }
    .exercise-card:nth-child(5)  { animation-delay: 0.12s; }
    .exercise-card:nth-child(6)  { animation-delay: 0.15s; }
    .exercise-card:nth-child(7)  { animation-delay: 0.18s; }
    .exercise-card:nth-child(8)  { animation-delay: 0.21s; }
    .exercise-card:nth-child(9)  { animation-delay: 0.24s; }
    .exercise-card:nth-child(10) { animation-delay: 0.27s; }

    .exercise-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      color: var(--accent);
      line-height: 1;
      min-width: 28px;
      padding-top: 2px;
    }
    .exercise-info { flex: 1; }
    .exercise-name {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .exercise-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .tag-muscle {
      background: #2a1215;
      color: #f28b8f;
      border: 1px solid #6b1d24;
    }
    .tag-equipment {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      margin-top: 48px;
      color: #444;
      font-size: 0.75rem;
    }

    /* ── INFO BUTTON ── */
    .exercise-card { position: relative; }
    .info-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: 1.5px solid var(--border);
      color: var(--text-muted);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: color 0.15s, border-color 0.15s;
      padding: 0;
    }
    .info-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      max-width: 420px;
      width: 90%;
      background: #1a1a1a;
      border-radius: 14px;
      padding: 24px;
      position: relative;
      border: 1.5px solid #2a2a2a;
    }
    .modal-close {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--accent); }
    #modal-gif {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 16px;
      min-height: 220px;
      background: #111;
      object-fit: cover;
      display: block;
    }
    .modal-name {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .modal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .modal-yt-link {
      display: inline-block;
      background: #c4302b;
      color: #fff;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 20px;
      letter-spacing: 0.3px;
      transition: background 0.15s;
    }
    .modal-yt-link:hover { background: #a52520; }
  </style>
</head>

<header>

  <p>Pick your muscles. Get your workout. No excuses.</p>
</header>

<main>

        <input type="number" id="exercise-count" value="6" min="1" max="30" readonly />
        <button class="num-btn" id="increment" aria-label="Increase">&#43;</button>
      </div>
    </div>
    <button class="btn btn-primary" id="generate-btn">Generate Workout</button>
    <button class="btn btn-secondary" id="regen-btn" style="display:none">Regenerate</button>
  </div>

  <!-- NOTICE -->
  <div class="notice" id="notice"></div>

  <!-- OUTPUT -->
  <div id="output">
    <div class="output-header">
      <div>
        <div class="output-title" id="output-title">YOUR WORKOUT</div>
        <div class="output-meta" id="output-meta"></div>
      </div>
    </div>
    <div class="exercise-list" id="exercise-list"></div>
  </div>

  <footer>Workout Generator &mdash; Offline &amp; Open Source</footer>
</main>

<div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" id="modal-box">
    <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    <img id="modal-gif" src="" alt="" />
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-tags" id="modal-tags"></div>
    <a id="modal-yt-link" class="modal-yt-link" target="_blank" rel="noopener" style="display:none">▶ Watch on YouTube</a>
  </div>
</div>

// ─────────────────────────────────────────────
// MUSCLE GROUP CONFIG
// ─────────────────────────────────────────────
const MUSCLE_GROUPS = [
  { key: "Chest",      icon: "💪" },
  { key: "Back",       icon: "🔙" },
  { key: "Shoulders",  icon: "🏋️" },
  { key: "Biceps",     icon: "💪" },
  { key: "Triceps",    icon: "🦾" },
  { key: "Quads",      icon: "🦵" },
  { key: "Hamstrings", icon: "🦵" },
  { key: "Glutes",     icon: "🍑" },
  { key: "Calves",     icon: "🦿" },
  { key: "Core",       icon: "🎯" },
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let selected = new Set();
let lastWorkout = null;

// ─────────────────────────────────────────────
// BUILD MUSCLE GRID
// ─────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById("muscle-grid");
  MUSCLE_GROUPS.forEach(({ key, icon }) => {
    const card = document.createElement("div");
    card.className = "muscle-card";
    card.dataset.muscle = key;
    card.innerHTML = `<div class="icon">${icon}</div><div class="label">${key}</div>`;
    card.addEventListener("click", () => toggleMuscle(key, card));
    grid.appendChild(card);
  });
}

function toggleMuscle(key, card) {
  if (selected.has(key)) {
    selected.delete(key);
    card.classList.remove("selected");
  } else {
    selected.add(key);
    card.classList.add("selected");
  }
}

// ─────────────────────────────────────────────
// EXERCISE COUNT CONTROLS
// ─────────────────────────────────────────────
const countInput = document.getElementById("exercise-count");

document.getElementById("increment").addEventListener("click", () => {
  const v = parseInt(countInput.value);
  if (v < 30) countInput.value = v + 1;
});
document.getElementById("decrement").addEventListener("click", () => {
  const v = parseInt(countInput.value);
  if (v > 1) countInput.value = v - 1;
});

// ─────────────────────────────────────────────
// DISTRIBUTION ALGORITHM
// Spreads N exercises as evenly as possible across groups.
// If a group runs out of exercises, remaining slots go to others.
// ─────────────────────────────────────────────
function generateWorkout(muscles, count) {
  // Build per-muscle pools (shuffled)
  const pools = {};
  muscles.forEach(m => {
    const list = EXERCISES.filter(e => e.muscle === m);
    pools[m] = shuffle([...list]);
  });

  const n = muscles.length;
  // Base count per group + remainder
  const base = Math.floor(count / n);
  const remainder = count % n;

  // Assign target counts
  const targets = {};
  muscles.forEach((m, i) => {
    targets[m] = base + (i < remainder ? 1 : 0);
  });

  const picked = [];
  const overflow = [];

  // First pass: pick up to target from each group
  muscles.forEach(m => {
    const pool = pools[m];
    const want = targets[m];
    const take = Math.min(want, pool.length);
    for (let i = 0; i < take; i++) picked.push(pool[i]);
    const deficit = want - take;
    for (let d = 0; d < deficit; d++) overflow.push(m); // track shortfall
  });

  // Second pass: fill shortfall from groups that have extras
  if (overflow.length > 0) {
    // Collect leftover exercises from all groups
    const extras = [];
    muscles.forEach(m => {
      const pool = pools[m];
      const used = Math.min(targets[m], pool.length);
      for (let i = used; i < pool.length; i++) extras.push(pool[i]);
    });
    shuffle(extras);
    const fill = Math.min(overflow.length, extras.length);
    for (let i = 0; i < fill; i++) picked.push(extras[i]);
  }

  return shuffle(picked);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ─────────────────────────────────────────────
// RENDER OUTPUT
// ─────────────────────────────────────────────
function renderWorkout(exercises, muscles) {
  const list = document.getElementById("exercise-list");
  const meta = document.getElementById("output-meta");

  list.innerHTML = "";
  exercises.forEach((ex, i) => {
    const card = document.createElement("div");
    card.className = "exercise-card";
    card.innerHTML = `
      <div class="exercise-num">${String(i + 1).padStart(2, "0")}</div>
      <div class="exercise-info">
        <div class="exercise-name">${ex.name}</div>
        <div class="exercise-tags">
          <span class="tag tag-muscle">${ex.muscle}</span>
          <span class="tag tag-equipment">${ex.equipment}</span>
        </div>
      </div>
      <button class="info-btn" aria-label="Show demo">ⓘ</button>`;
    card.querySelector(".info-btn").addEventListener("click", () => openModal(ex));
    list.appendChild(card);
  });

  meta.textContent = `${exercises.length} exercise${exercises.length !== 1 ? "s" : ""} · ${muscles.join(", ")}`;

  document.getElementById("output").classList.add("visible");
  document.getElementById("regen-btn").style.display = "";

  // Scroll to output
  document.getElementById("output").scrollIntoView({ behavior: "smooth", block: "start" });
}

// ─────────────────────────────────────────────
// SHOW / HIDE NOTICE
// ─────────────────────────────────────────────
function showNotice(msg) {
  const el = document.getElementById("notice");
  el.textContent = msg;
  el.classList.add("visible");
}
function clearNotice() {
  document.getElementById("notice").classList.remove("visible");
}

// ─────────────────────────────────────────────
// BUTTON HANDLERS
// ─────────────────────────────────────────────
function handleGenerate() {
  clearNotice();

  const muscles = [...selected];
  const count = parseInt(countInput.value);

  if (muscles.length === 0) {
    showNotice("Please select at least one muscle group.");
    return;
  }
  if (!count || count < 1) {
    showNotice("Please enter at least 1 exercise.");
    return;
  }

  const totalAvailable = EXERCISES.filter(e => muscles.includes(e.muscle)).length;
  if (count > totalAvailable) {
    showNotice(`Only ${totalAvailable} exercises available for the selected muscle groups. Showing all of them.`);
    // continue — will just show all
  }

  const workout = generateWorkout(muscles, Math.min(count, totalAvailable));
  lastWorkout = { muscles, count };
  renderWorkout(workout, muscles);
}

function handleRegen() {
  if (!lastWorkout) return;
  clearNotice();
  const { muscles, count } = lastWorkout;
  const totalAvailable = EXERCISES.filter(e => muscles.includes(e.muscle)).length;
  const workout = generateWorkout(muscles, Math.min(count, totalAvailable));
  renderWorkout(workout, muscles);
}

document.getElementById("generate-btn").addEventListener("click", handleGenerate);
document.getElementById("regen-btn").addEventListener("click", handleRegen);

// ─────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────
function openModal(ex) {
  const overlay = document.getElementById("modal-overlay");
  const gifEl   = document.getElementById("modal-gif");
  const nameEl  = document.getElementById("modal-name");
  const tagsEl  = document.getElementById("modal-tags");
  const ytLink  = document.getElementById("modal-yt-link");

  nameEl.textContent = ex.name;
  tagsEl.innerHTML = `
    <span class="tag tag-muscle">${ex.muscle}</span>
    <span class="tag tag-equipment">${ex.equipment}</span>`;

  const query = encodeURIComponent(ex.name + " exercise");
  ytLink.href = "https://www.youtube.com/results?search_query=" + query;

  if (ex.gif) {
    gifEl.style.display = "block";
    gifEl.src = ex.gif;
    gifEl.alt = ex.name;
    ytLink.style.display = "none";
    gifEl.onerror = () => {
      gifEl.style.display = "none";
      ytLink.style.display = "inline-block";
    };
  } else {
    gifEl.style.display = "none";
    gifEl.src = "";
    ytLink.style.display = "inline-block";
  }

  overlay.classList.add("open");
  document.getElementById("modal-close").focus();
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
}

document.getElementById("modal-close").addEventListener("click", closeModal);

document.getElementById("modal-overlay").addEventListener("click", (e) => {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildGrid();
</script>
